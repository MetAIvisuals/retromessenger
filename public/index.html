<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Messenger</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', cursive;
    }
    
    .pixel-font {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
    }
    
    .pixel-button {
      transition: all 0.1s;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    }
    
    .pixel-button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    
    .pixel-button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }
    
    .blink {
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Lucide Icons as simple SVG components
    const Send = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    );

    const LogOut = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    );

    const Smile = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
        <line x1="9" y1="9" x2="9.01" y2="9"></line>
        <line x1="15" y1="9" x2="15.01" y2="9"></line>
      </svg>
    );

    const PixelMessenger = () => {
      const [username, setUsername] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeChat, setActiveChat] = useState(null);
      const [message, setMessage] = useState('');
      const [messages, setMessages] = useState([]);
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [ws, setWs] = useState(null);
      const [connectionError, setConnectionError] = useState(false);
      const messagesEndRef = useRef(null);

      const WS_URL = 'wss://retromessenger-production.up.railway.app';

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      useEffect(() => {
        if (isLoggedIn) {
          const websocket = new WebSocket(WS_URL);
          
          websocket.onopen = () => {
            console.log('Connected to server');
            setConnectionError(false);
            websocket.send(JSON.stringify({
              type: 'login',
              username: username
            }));
          };

          websocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
              case 'users':
                setOnlineUsers(data.users.filter(u => u !== username));
                break;
              case 'message':
                setMessages(prev => [...prev, data]);
                break;
              case 'history':
                setMessages(data.messages);
                break;
            }
          };

          websocket.onerror = (error) => {
            console.error('WebSocket error:', error);
            setConnectionError(true);
          };

          websocket.onclose = () => {
            console.log('Disconnected from server');
          };

          setWs(websocket);

          return () => {
            websocket.close();
          };
        }
      }, [isLoggedIn, username]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (username.trim()) {
          setIsLoggedIn(true);
        }
      };

      const sendMessage = () => {
        if (message.trim() && ws && activeChat) {
          ws.send(JSON.stringify({
            type: 'message',
            to: activeChat,
            text: message
          }));
          setMessage('');
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const selectChat = (user) => {
        setActiveChat(user);
        if (ws) {
          ws.send(JSON.stringify({
            type: 'getHistory',
            with: user
          }));
        }
      };

      const handleLogout = () => {
        if (ws) {
          ws.close();
        }
        setIsLoggedIn(false);
        setUsername('');
        setActiveChat(null);
        setMessages([]);
        setOnlineUsers([]);
      };

      const currentMessages = messages.filter(msg => 
        (msg.from === activeChat && msg.to === username) ||
        (msg.from === username && msg.to === activeChat)
      );

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-[#7c7c7c] flex items-center justify-center p-4 font-mono">
            <div className="bg-gradient-to-b from-[#ff6b9d] to-[#ffa94d] p-8 border-4 border-black rounded-xl shadow-[8px_8px_0_rgba(0,0,0,0.3)]">
              <div className="text-center mb-6">
                <div className="text-4xl mb-4">💬</div>
                <h1 className="pixel-font text-2xl text-[#ffe066] drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)] mb-2">
                  PIXEL.MSG
                </h1>
                <div className="text-xs text-white">ENTER YOUR NAME</div>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-4">
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  placeholder="USERNAME"
                  className="w-full px-4 py-3 bg-[#ffe066] border-4 border-black text-black placeholder-black/50 pixel-font text-xs focus:outline-none focus:border-[#ff6b9d] rounded"
                  maxLength={20}
                />
                
                <button
                  type="submit"
                  className="w-full px-6 py-3 bg-[#ffe066] border-4 border-black pixel-font text-xs text-[#ff6b9d] hover:bg-[#ffd633] pixel-button rounded-lg"
                >
                  START
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen bg-[#7c7c7c] p-4 font-mono overflow-hidden">
          <div className="h-full max-w-7xl mx-auto flex flex-col">
            {/* Header */}
            <div className="bg-gradient-to-r from-[#ff6b9d] to-[#ffa94d] p-4 mb-4 border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-2xl">
                    💬
                  </div>
                  <h1 className="pixel-font text-white text-sm sm:text-base drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)]">
                    PIXEL.MSG
                  </h1>
                </div>
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex items-center gap-2">
                    <div className={`w-3 h-3 ${connectionError ? 'bg-red-500' : 'bg-[#4ade80]'} border-2 border-black rounded-full blink`}></div>
                    <div className="pixel-font text-[10px] text-white">{connectionError ? 'OFFLINE' : 'ONLINE'}</div>
                  </div>
                  <button
                    onClick={handleLogout}
                    className="p-2 bg-[#ffe066] border-2 border-black hover:bg-[#ffd633] pixel-button rounded"
                  >
                    <LogOut size={16} />
                  </button>
                </div>
              </div>
            </div>

            {/* Main Container */}
            <div className="flex gap-4 flex-1 min-h-0">
              {/* Sidebar */}
              <div className="w-64 bg-gradient-to-b from-[#ff6b9d] to-[#ff8fab] border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl flex flex-col">
                <div className="bg-[#ffa94d] p-4 border-b-4 border-black rounded-t-lg">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-2xl">
                      😎
                    </div>
                    <div className="pixel-font text-[10px] text-white break-all">
                      {username}
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-2 min-h-0">
                  <div className="pixel-font text-[10px] text-[#ffe066] mb-3 px-2">ONLINE:</div>
                  {onlineUsers.length === 0 ? (
                    <div className="text-center text-white text-xs p-4">
                      No other users online
                    </div>
                  ) : (
                    onlineUsers.map((user) => (
                      <button
                        key={user}
                        onClick={() => selectChat(user)}
                        className={`w-full p-3 mb-2 border-4 border-black transition-all pixel-button rounded-lg ${
                          activeChat === user ? 'bg-[#ffe066]' : 'bg-[#ffa94d] hover:bg-[#ffbe7a]'
                        }`}
                      >
                        <div className="flex items-center gap-2">
                          <div className="text-2xl">👤</div>
                          <div className="flex-1 text-left">
                            <div className="text-[10px] pixel-font text-black break-all">{user}</div>
                            <div className="flex items-center gap-1 mt-1">
                              <div className="w-2 h-2 border border-black bg-[#4ade80] rounded-full"></div>
                              <span className="text-[8px] text-black">ONLINE</span>
                            </div>
                          </div>
                        </div>
                      </button>
                    ))
                  )}
                </div>

                <div className="p-3 border-t-4 border-black bg-[#ff6b9d] rounded-b-lg">
                  <div className="pixel-font text-[8px] text-white text-center">
                    {onlineUsers.length} USER{onlineUsers.length !== 1 ? 'S' : ''} ONLINE
                  </div>
                </div>
              </div>

              {/* Chat Area */}
              <div className="flex-1 bg-gradient-to-b from-[#ff6b9d] to-[#ff8fab] border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl flex flex-col min-h-0">
                {activeChat ? (
                  <>
                    <div className="bg-[#ffa94d] p-4 border-b-4 border-black rounded-t-lg">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-xl">
                          👤
                        </div>
                        <div>
                          <div className="pixel-font text-[10px] text-white">{activeChat}</div>
                          <div className="text-[8px] text-[#4ade80] mt-1">● ONLINE</div>
                        </div>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-[#c084fc]/20 min-h-0">
                      {currentMessages.length === 0 ? (
                        <div className="text-center text-white text-sm p-8">
                          Start chatting with {activeChat}!
                        </div>
                      ) : (
                        currentMessages.map((msg, idx) => (
                          <div key={idx} className={`flex ${msg.from === username ? 'justify-end' : 'justify-start'}`}>
                            <div
                              className={`max-w-[70%] p-3 border-4 border-black shadow-[4px_4px_0_rgba(0,0,0,0.3)] rounded-lg ${
                                msg.from === username ? 'bg-[#ffe066]' : 'bg-[#ffa94d]'
                              }`}
                            >
                              <div className="text-[10px] font-bold text-black mb-1 pixel-font">{msg.from}</div>
                              <div className="text-sm text-black break-words">{msg.text}</div>
                              <div className="text-[8px] text-black/70 mt-1">{msg.time}</div>
                            </div>
                          </div>
                        ))
                      )}
                      <div ref={messagesEndRef} />
                    </div>

                    <div className="p-4 bg-[#ff6b9d] border-t-4 border-black rounded-b-lg">
                      <div className="flex gap-2">
                        <button className="p-2 bg-[#ffe066] border-2 border-black hover:bg-[#ffd633] pixel-button rounded">
                          <Smile size={20} />
                        </button>
                        <input
                          type="text"
                          value={message}
                          onChange={(e) => setMessage(e.target.value)}
                          onKeyPress={handleKeyPress}
                          placeholder="TYPE MESSAGE..."
                          className="flex-1 px-4 py-2 bg-[#ffe066] border-4 border-black text-black placeholder-black/50 focus:outline-none focus:border-[#ffa94d] rounded"
                        />
                        <button
                          onClick={sendMessage}
                          className="px-6 py-2 bg-[#ffa94d] border-4 border-black hover:bg-[#ffbe7a] pixel-button font-bold rounded-lg"
                        >
                          <Send />
                        </button>
                      </div>
                    </div>
                  </>
                ) : (
                  <div className="flex-1 flex items-center justify-center">
                    <div className="text-center text-white p-8">
                      <div className="text-6xl mb-4">💬</div>
                      <div className="pixel-font text-sm mb-2">SELECT A USER</div>
                      <div className="text-xs">to start chatting</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<PixelMessenger />, document.getElementById('root'));
  </script>
</body>
</html>
