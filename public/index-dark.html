<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Messenger - Dark Mode</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', cursive;
      background: #000;
    }
    
    .pixel-font {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
    }
    
    .pixel-button {
      transition: all 0.1s;
      box-shadow: 4px 4px 0 rgba(0,255,255,0.5);
    }
    
    .pixel-button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0,255,255,0.5);
    }
    
    .pixel-button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }
    
    .blink {
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    .glow {
      text-shadow: 0 0 10px rgba(0,255,255,0.8), 0 0 20px rgba(0,255,255,0.5);
    }
    
    .glow-green {
      text-shadow: 0 0 10px rgba(0,255,0,0.8), 0 0 20px rgba(0,255,0,0.5);
    }
    
    .scanline {
      background: linear-gradient(
        to bottom,
        rgba(0, 255, 255, 0) 0%,
        rgba(0, 255, 255, 0.03) 50%,
        rgba(0, 255, 255, 0) 100%
      );
      background-size: 100% 4px;
      animation: scan 8s linear infinite;
    }
    
    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }
    
    .notification {
      animation: slideIn 0.3s ease-out, slideOut 0.3s ease-in 2.7s;
    }
    
    @keyframes slideIn {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-100px);
        opacity: 0;
      }
    }
    
    .bounce {
      animation: bounce 0.5s ease-in-out;
    }
    
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Lucide Icons as simple SVG components
    const Send = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    );

    const LogOut = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    );

    const Smile = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
        <line x1="9" y1="9" x2="9.01" y2="9"></line>
        <line x1="15" y1="9" x2="15.01" y2="9"></line>
      </svg>
    );

    const PixelMessenger = () => {
      const [username, setUsername] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeChat, setActiveChat] = useState(null);
      const [message, setMessage] = useState('');
      const [messages, setMessages] = useState([]);
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [ws, setWs] = useState(null);
      const [connectionError, setConnectionError] = useState(false);
      const [notification, setNotification] = useState(null);
      const [unreadCounts, setUnreadCounts] = useState({});
      const messagesEndRef = useRef(null);

      const WS_URL = 'wss://retromessenger-production.up.railway.app';

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      useEffect(() => {
        if (isLoggedIn) {
          const websocket = new WebSocket(WS_URL);
          
          websocket.onopen = () => {
            console.log('Connected to server');
            setConnectionError(false);
            websocket.send(JSON.stringify({
              type: 'login',
              username: username
            }));
          };

          websocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
              case 'users':
                setOnlineUsers(data.users.filter(u => u !== username));
                break;
              case 'message':
                setMessages(prev => [...prev, data]);
                
                // Show notification if message is from someone else and not in active chat
                if (data.from !== username) {
                  // Play sound notification
                  try {
                    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGJ0fPTgjMGHm7A7+OZSA0PVqzn77BdGAw+mdrxxnEiBSuBzvLaiTcIGWi77eefTRAMUKfj8LZjHAY4ktfyy3ksBSR3yPDdkEAKFF606eunVRQKRp/g8r5sIQUxidHz04IzBh5uwO/jmUgND1as5++wXRgMPpnZ8sd');
                    audio.volume = 0.3;
                    audio.play().catch(() => {});
                  } catch (e) {}
                  
                  // Show notification popup
                  setNotification({
                    from: data.from,
                    text: data.text,
                    time: Date.now()
                  });
                  
                  // Hide notification after 3 seconds
                  setTimeout(() => setNotification(null), 3000);
                  
                  // Increment unread count if not in that chat
                  if (data.from !== activeChat) {
                    setUnreadCounts(prev => ({
                      ...prev,
                      [data.from]: (prev[data.from] || 0) + 1
                    }));
                  }
                  
                  // Browser notification (if permission granted)
                  if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(`New message from ${data.from}`, {
                      body: data.text.substring(0, 50) + (data.text.length > 50 ? '...' : ''),
                      icon: '💬',
                      tag: 'pixel-messenger'
                    });
                  }
                }
                break;
              case 'history':
                setMessages(data.messages);
                break;
            }
          };

          websocket.onerror = (error) => {
            console.error('WebSocket error:', error);
            setConnectionError(true);
          };

          websocket.onclose = () => {
            console.log('Disconnected from server');
          };

          setWs(websocket);

          return () => {
            websocket.close();
          };
        }
      }, [isLoggedIn, username]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (username.trim()) {
          setIsLoggedIn(true);
          
          // Request notification permission
          if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
          }
        }
      };

      const sendMessage = () => {
        if (message.trim() && ws && activeChat) {
          ws.send(JSON.stringify({
            type: 'message',
            to: activeChat,
            text: message
          }));
          setMessage('');
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const selectChat = (user) => {
        setActiveChat(user);
        
        // Clear unread count for this user
        setUnreadCounts(prev => ({
          ...prev,
          [user]: 0
        }));
        
        if (ws) {
          ws.send(JSON.stringify({
            type: 'getHistory',
            with: user
          }));
        }
      };

      const handleLogout = () => {
        if (ws) {
          ws.close();
        }
        setIsLoggedIn(false);
        setUsername('');
        setActiveChat(null);
        setMessages([]);
        setOnlineUsers([]);
      };

      const currentMessages = messages.filter(msg => 
        (msg.from === activeChat && msg.to === username) ||
        (msg.from === username && msg.to === activeChat)
      );

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-black flex items-center justify-center p-4 font-mono relative overflow-hidden">
            <div className="absolute inset-0 scanline pointer-events-none"></div>
            
            <div className="bg-gradient-to-b from-gray-900 to-black p-8 border-4 border-cyan-400 rounded-xl shadow-[8px_8px_0_rgba(0,255,255,0.5)] relative z-10">
              <div className="text-center mb-6">
                <div className="text-4xl mb-4 glow">⚡</div>
                <h1 className="pixel-font text-2xl text-cyan-400 glow mb-2">
                  PIXEL.MSG
                </h1>
                <div className="text-xs text-lime-400 glow-green">» ENTER_USERNAME «</div>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-4">
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  placeholder="USERNAME_"
                  className="w-full px-4 py-3 bg-black border-4 border-cyan-400 text-cyan-400 placeholder-cyan-400/50 pixel-font text-xs focus:outline-none focus:border-lime-400 focus:text-lime-400 rounded glow"
                  maxLength={20}
                />
                
                <button
                  type="submit"
                  className="w-full px-6 py-3 bg-black border-4 border-lime-400 pixel-font text-xs text-lime-400 hover:bg-lime-400 hover:text-black pixel-button rounded-lg glow-green"
                >
                  &gt;&gt; CONNECT &lt;&lt;
                </button>
              </form>
              
              <div className="mt-4 text-center">
                <div className="text-[8px] text-cyan-400/70 pixel-font">
                  [SYSTEM READY]
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen bg-black p-4 font-mono overflow-hidden relative">
          <div className="absolute inset-0 scanline pointer-events-none"></div>
          
          {/* Notification Popup */}
          {notification && (
            <div className="fixed top-4 right-4 z-50 notification">
              <div className="bg-gradient-to-r from-gray-800 to-black p-4 border-4 border-cyan-400 rounded-xl shadow-[8px_8px_0_rgba(0,255,255,0.8)] max-w-sm">
                <div className="flex items-start gap-3">
                  <div className="text-2xl bounce">⚡</div>
                  <div className="flex-1">
                    <div className="pixel-font text-[10px] text-cyan-400 mb-1 glow">
                      [NEW_MESSAGE]
                    </div>
                    <div className="pixel-font text-xs text-lime-400 mb-2 glow-green">
                      &gt; {notification.from}
                    </div>
                    <div className="text-xs text-cyan-400 bg-black/50 p-2 rounded border-2 border-cyan-400/30">
                      {notification.text.substring(0, 50)}{notification.text.length > 50 ? '...' : ''}
                    </div>
                  </div>
                  <button 
                    onClick={() => setNotification(null)}
                    className="text-cyan-400 hover:text-lime-400 text-xl leading-none"
                  >
                    ×
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <div className="h-full max-w-7xl mx-auto flex flex-col relative z-10">
            {/* Header */}
            <div className="bg-gradient-to-r from-gray-900 via-black to-gray-900 p-4 mb-4 border-4 border-cyan-400 shadow-[8px_8px_0_rgba(0,255,255,0.5)] rounded-xl">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 bg-black border-4 border-lime-400 rounded flex items-center justify-center text-2xl">
                    ⚡
                  </div>
                  <div>
                    <h1 className="pixel-font text-cyan-400 text-sm sm:text-base glow">
                      PIXEL.MSG
                    </h1>
                    <div className="text-[8px] text-lime-400 mt-1 glow-green">v2.0_DARK</div>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex items-center gap-2">
                    <div className={`w-3 h-3 ${connectionError ? 'bg-red-500 border-red-500' : 'bg-lime-400 border-lime-400'} border-2 rounded-full blink`}></div>
                    <div className="pixel-font text-[10px] text-lime-400 glow-green">
                      {connectionError ? '[OFFLINE]' : '[ONLINE]'}
                    </div>
                  </div>
                  <button
                    onClick={handleLogout}
                    className="p-2 bg-black border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-black pixel-button rounded"
                  >
                    <LogOut size={16} />
                  </button>
                </div>
              </div>
            </div>

            {/* Main Container */}
            <div className="flex gap-4 flex-1 min-h-0">
              {/* Sidebar */}
              <div className="w-64 bg-gradient-to-b from-gray-900 to-black border-4 border-cyan-400 shadow-[8px_8px_0_rgba(0,255,255,0.5)] rounded-xl flex flex-col">
                <div className="bg-black p-4 border-b-4 border-cyan-400 rounded-t-lg">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 bg-black border-4 border-lime-400 rounded flex items-center justify-center text-2xl">
                      👾
                    </div>
                    <div>
                      <div className="pixel-font text-[10px] text-lime-400 break-all glow-green">
                        {username}
                      </div>
                      <div className="text-[8px] text-cyan-400 mt-1">[USER]</div>
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-2 min-h-0 bg-black/50">
                  <div className="pixel-font text-[10px] text-cyan-400 mb-3 px-2 glow">
                    &gt; ONLINE_USERS:
                  </div>
                  {onlineUsers.length === 0 ? (
                    <div className="text-center text-cyan-400/50 text-xs p-4">
                      [NO_USERS_FOUND]
                    </div>
                  ) : (
                    onlineUsers.map((user) => (
                      <button
                        key={user}
                        onClick={() => selectChat(user)}
                        className={`w-full p-3 mb-2 border-4 transition-all pixel-button rounded-lg relative ${
                          activeChat === user
                            ? 'bg-lime-400 border-lime-400 text-black'
                            : 'bg-black border-cyan-400 text-cyan-400 hover:border-lime-400 hover:text-lime-400'
                        }`}
                      >
                        {unreadCounts[user] > 0 && (
                          <div className="absolute -top-2 -right-2 bg-red-500 border-2 border-black rounded-full w-6 h-6 flex items-center justify-center shadow-[0_0_10px_rgba(255,0,0,0.8)]">
                            <span className="text-white text-[10px] font-bold">
                              {unreadCounts[user] > 9 ? '9+' : unreadCounts[user]}
                            </span>
                          </div>
                        )}
                        <div className="flex items-center gap-2">
                          <div className="text-2xl">🟢</div>
                          <div className="flex-1 text-left">
                            <div className="text-[10px] pixel-font break-all">{user}</div>
                            <div className="flex items-center gap-1 mt-1">
                              <div className="w-2 h-2 border border-current bg-current rounded-full blink"></div>
                              <span className="text-[8px]">[ACTIVE]</span>
                            </div>
                          </div>
                        </div>
                      </button>
                    ))
                  )}
                </div>

                <div className="p-3 border-t-4 border-cyan-400 bg-black rounded-b-lg">
                  <div className="pixel-font text-[8px] text-lime-400 text-center glow-green">
                    {onlineUsers.length} USER{onlineUsers.length !== 1 ? 'S' : ''} [ACTIVE]
                  </div>
                </div>
              </div>

              {/* Chat Area */}
              <div className="flex-1 bg-gradient-to-b from-gray-900 to-black border-4 border-cyan-400 shadow-[8px_8px_0_rgba(0,255,255,0.5)] rounded-xl flex flex-col min-h-0">
                {activeChat ? (
                  <>
                    <div className="bg-black p-4 border-b-4 border-cyan-400 rounded-t-lg">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-black border-4 border-lime-400 rounded flex items-center justify-center text-xl">
                          👾
                        </div>
                        <div>
                          <div className="pixel-font text-[10px] text-lime-400 glow-green">&gt; {activeChat}</div>
                          <div className="text-[8px] text-cyan-400 mt-1">● [CONNECTED]</div>
                        </div>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-black/80 min-h-0">
                      {currentMessages.length === 0 ? (
                        <div className="text-center text-cyan-400 text-sm p-8">
                          <div className="glow">[CHANNEL_OPEN]</div>
                          <div className="text-xs mt-2 text-cyan-400/70">Start transmission...</div>
                        </div>
                      ) : (
                        currentMessages.map((msg, idx) => (
                          <div key={idx} className={`flex ${msg.from === username ? 'justify-end' : 'justify-start'}`}>
                            <div
                              className={`max-w-[70%] p-3 border-4 rounded-lg ${
                                msg.from === username
                                  ? 'bg-black border-lime-400 shadow-[4px_4px_0_rgba(0,255,0,0.5)]'
                                  : 'bg-gray-900 border-cyan-400 shadow-[4px_4px_0_rgba(0,255,255,0.5)]'
                              }`}
                            >
                              <div className={`text-[10px] font-bold mb-1 pixel-font ${
                                msg.from === username ? 'text-lime-400 glow-green' : 'text-cyan-400 glow'
                              }`}>
                                &gt; {msg.from}
                              </div>
                              <div className={`text-sm break-words ${
                                msg.from === username ? 'text-lime-400' : 'text-cyan-400'
                              }`}>
                                {msg.text}
                              </div>
                              <div className="text-[8px] text-gray-500 mt-1">[{msg.time}]</div>
                            </div>
                          </div>
                        ))
                      )}
                      <div ref={messagesEndRef} />
                    </div>

                    <div className="p-4 bg-black border-t-4 border-cyan-400 rounded-b-lg">
                      <div className="flex gap-2">
                        <button className="p-2 bg-black border-2 border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black pixel-button rounded">
                          <Smile size={20} />
                        </button>
                        <input
                          type="text"
                          value={message}
                          onChange={(e) => setMessage(e.target.value)}
                          onKeyPress={handleKeyPress}
                          placeholder="TYPE_MESSAGE_"
                          className="flex-1 px-4 py-2 bg-black border-4 border-cyan-400 text-cyan-400 placeholder-cyan-400/50 focus:outline-none focus:border-lime-400 focus:text-lime-400 rounded glow"
                        />
                        <button
                          onClick={sendMessage}
                          className="px-6 py-2 bg-black border-4 border-lime-400 text-lime-400 hover:bg-lime-400 hover:text-black pixel-button font-bold rounded-lg"
                        >
                          <Send />
                        </button>
                      </div>
                      <div className="text-[8px] text-cyan-400/50 mt-2 pixel-font text-center">
                        [ENTER] TO SEND • [ESC] TO CANCEL
                      </div>
                    </div>
                  </>
                ) : (
                  <div className="flex-1 flex items-center justify-center bg-black/80">
                    <div className="text-center text-cyan-400 p-8">
                      <div className="text-6xl mb-4 glow">⚡</div>
                      <div className="pixel-font text-sm mb-2 glow">[SELECT_USER]</div>
                      <div className="text-xs text-cyan-400/70">to establish connection...</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
            
            {/* Footer */}
            <div className="mt-4 text-center">
              <div className="pixel-font text-[8px] text-cyan-400/50 blink">
                ▂▃▅▇█▓▒░ [TRANSMISSION_ACTIVE] ░▒▓█▇▅▃▂
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<PixelMessenger />, document.getElementById('root'));
  </script>
</body>
</html>
