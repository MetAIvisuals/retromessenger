<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Messenger</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', cursive;
    }
    
    .pixel-font {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
    }
    
    .pixel-button {
      transition: all 0.1s;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    }
    
    .pixel-button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    
    .pixel-button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }
    
    .blink {
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    .notification {
      animation: slideIn 0.3s ease-out, slideOut 0.3s ease-in 2.7s;
    }
    
    @keyframes slideIn {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-100px);
        opacity: 0;
      }
    }
    
    .bounce {
      animation: bounce 0.5s ease-in-out;
    }
    
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Send = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    );

    const LogOut = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    );

    const Smile = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
        <line x1="9" y1="9" x2="9.01" y2="9"></line>
        <line x1="15" y1="9" x2="15.01" y2="9"></line>
      </svg>
    );

    const Menu = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    );

    const ChevronLeft = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    );

    const ChevronRight = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    );

    const X = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );

    const PixelMessenger = () => {
      const [username, setUsername] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeChat, setActiveChat] = useState(null);
      const [isGroupChat, setIsGroupChat] = useState(true);
      const [message, setMessage] = useState('');
      const [messages, setMessages] = useState([]);
      const [groupMessages, setGroupMessages] = useState([]);
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [ws, setWs] = useState(null);
      const [connectionError, setConnectionError] = useState(false);
      const [notification, setNotification] = useState(null);
      const [unreadCounts, setUnreadCounts] = useState({});
      const [groupUnread, setGroupUnread] = useState(0);
      const [showSidebar, setShowSidebar] = useState(true);
      const [showEmojiPicker, setShowEmojiPicker] = useState(false);
      const [showCreateRoom, setShowCreateRoom] = useState(false);
      const [customRooms, setCustomRooms] = useState([]);
      const [activeRoom, setActiveRoom] = useState(null);
      const [roomMessages, setRoomMessages] = useState({});
      const [newRoomName, setNewRoomName] = useState('');
      const [errorMessage, setErrorMessage] = useState('');
      const messagesEndRef = useRef(null);

      const WS_URL = 'wss://retromessenger-production.up.railway.app';

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, groupMessages]);

      useEffect(() => {
        if (isLoggedIn) {
          const websocket = new WebSocket(WS_URL);
          
          websocket.onopen = () => {
            console.log('Connected to server');
            setConnectionError(false);
            websocket.send(JSON.stringify({
              type: 'login',
              username: username
            }));
          };

          websocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
              case 'session':
                // Ignore admin status
                break;
                
              case 'users':
                setOnlineUsers(data.users.filter(u => u.username !== username));
                break;
                
              case 'groupMessage':
                setGroupMessages(prev => [...prev, data]);
                
                if (data.from !== username && !isGroupChat) {
                  setGroupUnread(prev => prev + 1);
                  
                  try {
                    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGJ0fPTgjMGHm7A7+OZSA0PVqzn77BdGAw+mdrxxnEiBSuBzvLaiTcIGWi77eefTRAMUKfj8LZjHAY4ktfyy3ksBSR3yPDdkEAKFF606eunVRQKRp/g8r5sIQUxidHz04IzBh5uwO/jmUgND1as5++wXRgMPpnZ8cd');
                    audio.volume = 0.3;
                    audio.play().catch(() => {});
                  } catch (e) {}
                  
                  setNotification({
                    from: `${data.from} (Main Chat)`,
                    text: data.text,
                    time: Date.now()
                  });
                  setTimeout(() => setNotification(null), 3000);
                }
                break;
                
              case 'groupHistory':
                setGroupMessages(data.messages);
                break;
                
              case 'groupChatCleared':
                setGroupMessages([]);
                setNotification({
                  from: 'System',
                  text: 'Group chat was cleared by admin',
                  time: Date.now()
                });
                setTimeout(() => setNotification(null), 3000);
                break;
                
              case 'message':
                setMessages(prev => [...prev, data]);
                
                if (data.from !== username) {
                  try {
                    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGJ0fPTgjMGHm7A7+OZSA0PVqzn77BdGAw+mdrxxnEiBSuBzvLaiTcIGWi77eefTRAMUKfj8LZjHAY4ktfyy3ksBSR3yPDdkEAKFF606eunVRQKRp/g8r5sIQUxidHz04IzBh5uwO/jmUgND1as5++wXRgMPpnZ8cd');
                    audio.volume = 0.3;
                    audio.play().catch(() => {});
                  } catch (e) {}
                  
                  setNotification({
                    from: data.from,
                    text: data.text,
                    time: Date.now()
                  });
                  setTimeout(() => setNotification(null), 3000);
                  
                  if (data.from !== activeChat) {
                    setUnreadCounts(prev => ({
                      ...prev,
                      [data.from]: (prev[data.from] || 0) + 1
                    }));
                  }
                  
                  if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(`New message from ${data.from}`, {
                      body: data.text.substring(0, 50) + (data.text.length > 50 ? '...' : ''),
                      icon: '💬',
                      tag: 'pixel-messenger'
                    });
                  }
                }
                break;
                
              case 'roomsList':
                setCustomRooms(data.rooms || []);
                break;
                
              case 'roomCreated':
                setCustomRooms(prev => [...prev, data.room]);
                setActiveRoom(data.room.id);
                setIsGroupChat(false);
                setActiveChat(null);
                setShowCreateRoom(false);
                setNewRoomName('');
                break;
                
              case 'roomMessage':
                setRoomMessages(prev => ({
                  ...prev,
                  [data.roomId]: [...(prev[data.roomId] || []), data]
                }));
                
                if (data.from !== username && data.roomId !== activeRoom) {
                  try {
                    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGJ0fPTgjMGHm7A7+OZSA0PVqzn77BdGAw+mdrxxnEiBSuBzvLaiTcIGWi77eefTRAMUKfj8LZjHAY4ktfyy3ksBSR3yPDdkEAKFF606eunVRQKRp/g8r5sIQUxidHz04IzBh5uwO/jmUgND1as5++wXRgMPpnZ8cd');
                    audio.volume = 0.3;
                    audio.play().catch(() => {});
                  } catch (e) {}
                  
                  setNotification({
                    from: `${data.from} in ${data.roomName}`,
                    text: data.text,
                    time: Date.now()
                  });
                  setTimeout(() => setNotification(null), 3000);
                }
                break;
                
              case 'roomHistory':
                setRoomMessages(prev => ({
                  ...prev,
                  [data.roomId]: data.messages
                }));
                break;
                
              case 'roomDeleted':
                setCustomRooms(prev => prev.filter(r => r.id !== data.roomId));
                if (activeRoom === data.roomId) {
                  setActiveRoom(null);
                  setIsGroupChat(true);
                }
                break;
                
              case 'history':
                setMessages(data.messages);
                break;
                
              case 'error':
                setErrorMessage(data.message);
                setTimeout(() => setErrorMessage(''), 5000);
                if (data.message.includes('taken') || data.message.includes('banned')) {
                  setIsLoggedIn(false);
                }
                break;
                
              case 'kicked':
                alert(data.message);
                window.location.reload();
                break;
                
              case 'banned':
                alert(data.message);
                window.location.reload();
                break;
            }
          };

          websocket.onerror = (error) => {
            console.error('WebSocket error:', error);
            setConnectionError(true);
          };

          websocket.onclose = () => {
            console.log('Disconnected from server');
          };

          setWs(websocket);

          return () => {
            websocket.close();
          };
        }
      }, [isLoggedIn, username]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (username.trim()) {
          setIsLoggedIn(true);
          
          if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
          }
        }
      };

      // Emoji picker
      const emojis = ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊', '😇', '🥰', '😍', '🤩', '😘', '😗', '😚', '😙', '🥲', '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏', '😒', '🙄', '😬', '🤥', '😌', '😔', '😪', '🤤', '😴', '😷', '🤒', '🤕', '🤢', '🤮', '🤧', '🥵', '🥶', '😎', '🤓', '🧐', '😕', '😟', '🙁', '☹️', '😮', '😯', '😲', '😳', '🥺', '😦', '😧', '😨', '😰', '😥', '😢', '😭', '😱', '😖', '😣', '😞', '😓', '😩', '😫', '🥱', '😤', '😡', '😠', '🤬', '👋', '🤚', '🖐️', '✋', '🖖', '👌', '🤌', '🤏', '✌️', '🤞', '🤟', '🤘', '🤙', '👈', '👉', '👆', '🖕', '👇', '☝️', '👍', '👎', '✊', '👊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '💪', '🦾', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟', '🔥', '✨', '💫', '⭐', '🌟', '💯', '✅', '❌', '⚠️', '🎉', '🎊', '🎁', '🎈', '🏆', '🥇', '🥈', '🥉', '⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍', '🏏', '🪃', '🥅', '⛳', '🪁', '🏹', '🎣'];
      
      const insertEmoji = (emoji) => {
        setMessage(prev => prev + emoji);
        setShowEmojiPicker(false);
      };

      const sendMessage = () => {
        if (message.trim() && ws) {
          if (isGroupChat) {
            ws.send(JSON.stringify({
              type: 'groupMessage',
              text: message
            }));
          } else if (activeRoom) {
            ws.send(JSON.stringify({
              type: 'roomMessage',
              roomId: activeRoom,
              text: message
            }));
          } else if (activeChat) {
            ws.send(JSON.stringify({
              type: 'message',
              to: activeChat,
              text: message
            }));
          }
          setMessage('');
        }
      };

      const createRoom = () => {
        if (newRoomName.trim() && ws) {
          ws.send(JSON.stringify({
            type: 'createRoom',
            roomName: newRoomName.trim(),
            invitedUsers: []
          }));
        }
      };

      const joinRoom = (roomId) => {
        setActiveRoom(roomId);
        setIsGroupChat(false);
        setActiveChat(null);
        
        if (ws) {
          ws.send(JSON.stringify({
            type: 'joinRoom',
            roomId: roomId
          }));
        }
      };

      const leaveRoom = (roomId) => {
        if (ws) {
          ws.send(JSON.stringify({
            type: 'leaveRoom',
            roomId: roomId
          }));
        }
        
        if (activeRoom === roomId) {
          setActiveRoom(null);
          setIsGroupChat(true);
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const selectChat = (user) => {
        setActiveChat(user);
        setIsGroupChat(false);
        setUnreadCounts(prev => ({
          ...prev,
          [user]: 0
        }));
        
        if (ws) {
          ws.send(JSON.stringify({
            type: 'getHistory',
            with: user
          }));
        }
      };

      const selectGroupChat = () => {
        setActiveChat(null);
        setIsGroupChat(true);
        setGroupUnread(0);
      };

      const handleLogout = () => {
        if (ws) {
          ws.close();
        }
        setIsLoggedIn(false);
        setUsername('');
        setActiveChat(null);
        setMessages([]);
        setGroupMessages([]);
        setOnlineUsers([]);
      };

      const currentMessages = isGroupChat 
        ? groupMessages 
        : activeRoom 
          ? (roomMessages[activeRoom] || [])
          : messages.filter(msg => 
              (msg.from === activeChat && msg.to === username) ||
              (msg.from === username && msg.to === activeChat)
            );

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-[#7c7c7c] flex items-center justify-center p-4 font-mono">
            <div className="bg-gradient-to-b from-[#ff6b9d] to-[#ffa94d] p-8 border-4 border-black rounded-xl shadow-[8px_8px_0_rgba(0,0,0,0.3)] max-w-md w-full">
              <div className="text-center mb-6">
                <div className="text-4xl mb-4">💬</div>
                <h1 className="pixel-font text-2xl text-[#ffe066] drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)] mb-2">
                  PIXEL.MSG
                </h1>
                <div className="text-xs text-white">ENTER YOUR NAME</div>
              </div>
              
              {errorMessage && (
                <div className="mb-4 p-3 bg-red-500 border-2 border-black rounded text-white text-xs">
                  {errorMessage}
                </div>
              )}
              
              <form onSubmit={handleLogin} className="space-y-4">
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  placeholder="USERNAME"
                  className="w-full px-4 py-3 bg-[#ffe066] border-4 border-black text-black placeholder-black/50 pixel-font text-xs focus:outline-none focus:border-[#ff6b9d] rounded"
                  maxLength={20}
                />
                
                <button
                  type="submit"
                  className="w-full px-6 py-3 bg-[#ffe066] border-4 border-black pixel-font text-xs text-[#ff6b9d] hover:bg-[#ffd633] pixel-button rounded-lg"
                >
                  START
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen bg-[#7c7c7c] p-4 font-mono overflow-hidden relative">
          {notification && (
            <div className="fixed top-4 right-4 z-50 notification">
              <div className="bg-gradient-to-r from-[#ff6b9d] to-[#ffa94d] p-4 border-4 border-black rounded-xl shadow-[8px_8px_0_rgba(0,0,0,0.5)] max-w-sm">
                <div className="flex items-start gap-3">
                  <div className="text-2xl bounce">💬</div>
                  <div className="flex-1">
                    <div className="pixel-font text-[10px] text-white mb-1">
                      New message from:
                    </div>
                    <div className="pixel-font text-xs text-[#ffe066] mb-2">
                      {notification.from}
                    </div>
                    <div className="text-xs text-white bg-black/20 p-2 rounded border-2 border-black/30">
                      {notification.text.substring(0, 50)}{notification.text.length > 50 ? '...' : ''}
                    </div>
                  </div>
                  <button 
                    onClick={() => setNotification(null)}
                    className="text-white hover:text-black text-xl leading-none"
                  >
                    ×
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <div className="h-full max-w-7xl mx-auto flex flex-col">
            <div className="bg-gradient-to-r from-[#ff6b9d] to-[#ffa94d] p-4 mb-4 border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-2xl">
                    💬
                  </div>
                  <h1 className="pixel-font text-white text-sm sm:text-base drop-shadow-[2px_2px_0_rgba(0,0,0,0.5)]">
                    PIXEL.MSG
                  </h1>
                </div>
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex items-center gap-2">
                    <div className={`w-3 h-3 ${connectionError ? 'bg-red-500' : 'bg-[#4ade80]'} border-2 border-black rounded-full blink`}></div>
                    <div className="pixel-font text-[10px] text-white">{connectionError ? 'OFFLINE' : 'ONLINE'}</div>
                  </div>
                  <button
                    onClick={handleLogout}
                    className="p-2 bg-[#ffe066] border-2 border-black hover:bg-[#ffd633] pixel-button rounded"
                  >
                    <LogOut size={16} />
                  </button>
                </div>
              </div>
            </div>

            <div className="flex flex-1 min-h-0 overflow-hidden relative">
              {/* Sidebar - Always visible on desktop, toggle on mobile */}
              <div className={`
                transition-transform duration-300 ease-in-out
                bg-gradient-to-b from-[#ff6b9d] to-[#ff8fab] border-4 border-black 
                shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl flex flex-col
                w-64 flex-shrink-0
                lg:relative lg:translate-x-0
                fixed left-0 top-0 bottom-0 z-40 lg:rounded-xl rounded-none
                ${showSidebar ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
              `}>
                <div className="flex flex-col h-full overflow-hidden pt-20 lg:pt-0">
                <div className="bg-[#ffa94d] p-4 border-b-4 border-black rounded-t-lg">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-2xl">
                      😎
                    </div>
                    <div className="pixel-font text-[10px] text-white break-all">
                      {username}
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-2 min-h-0">
                  <div className="pixel-font text-[10px] text-[#ffe066] mb-3 px-2">CHATS:</div>
                  
                  <button
                    onClick={selectGroupChat}
                    className={`w-full p-3 mb-3 border-4 border-black transition-all pixel-button rounded-lg relative ${
                      isGroupChat ? 'bg-[#ffe066]' : 'bg-[#ffa94d] hover:bg-[#ffbe7a]'
                    }`}
                  >
                    {groupUnread > 0 && !isGroupChat && (
                      <div className="absolute -top-2 -right-2 bg-red-500 border-2 border-black rounded-full w-6 h-6 flex items-center justify-center">
                        <span className="text-white text-[10px] font-bold">
                          {groupUnread > 9 ? '9+' : groupUnread}
                        </span>
                      </div>
                    )}
                    <div className="flex items-center gap-2">
                      <div className="text-2xl">🌐</div>
                      <div className="flex-1 text-left">
                        <div className="text-[10px] pixel-font text-black">Main Chat</div>
                        <div className="text-[8px] text-black/70 mt-1">Everyone</div>
                      </div>
                    </div>
                  </button>
                  
                  {/* Custom Rooms */}
                  {customRooms.length > 0 && (
                    <div className="mt-3">
                      <div className="pixel-font text-[10px] text-[#ff6b9d] mb-2 px-2 font-bold">
                        ROOMS:
                      </div>
                      {customRooms.map((room) => (
                        <div key={room.id} className="mb-2">
                          <button
                            onClick={() => joinRoom(room.id)}
                            className={`w-full p-3 border-4 border-black transition-all pixel-button rounded-lg ${
                              activeRoom === room.id 
                                ? 'bg-[#ffe066]' 
                                : 'bg-purple-300 hover:bg-purple-200'
                            }`}
                          >
                            <div className="flex items-center gap-2">
                              <div className="text-2xl">🏠</div>
                              <div className="flex-1 text-left">
                                <div className="text-[10px] pixel-font text-black break-all">{room.name}</div>
                                <div className="text-[8px] text-black/70 mt-1">{room.memberCount} members</div>
                              </div>
                            </div>
                          </button>
                          {activeRoom === room.id && (
                            <button
                              onClick={() => leaveRoom(room.id)}
                              className="w-full mt-1 px-3 py-1 bg-red-100 border-2 border-red-500 text-red-700 hover:bg-red-500 hover:text-white pixel-button rounded text-[8px]"
                            >
                              LEAVE ROOM
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                  
                  {/* Create Room Button */}
                  <button
                    onClick={() => setShowCreateRoom(true)}
                    className="w-full p-3 mt-3 border-4 border-dashed border-black text-black hover:bg-[#ffe066] pixel-button rounded-lg transition-all bg-white"
                  >
                    <div className="flex items-center gap-2 justify-center">
                      <div className="text-2xl">➕</div>
                      <div className="text-[10px] pixel-font">CREATE ROOM</div>
                    </div>
                  </button>

                  <div className="pixel-font text-[10px] text-[#ffe066] mb-2 mt-4 px-2">ONLINE:</div>
                  {onlineUsers.length === 0 ? (
                    <div className="text-center text-white text-xs p-4">
                      No other users online
                    </div>
                  ) : (
                    onlineUsers.map((user) => (
                      <button
                        key={user.username}
                        onClick={() => selectChat(user.username)}
                        className={`w-full p-3 mb-2 border-4 border-black transition-all pixel-button rounded-lg relative ${
                          activeChat === user.username && !isGroupChat ? 'bg-[#ffe066]' : 'bg-[#ffa94d] hover:bg-[#ffbe7a]'
                        }`}
                      >
                        {unreadCounts[user.username] > 0 && (
                          <div className="absolute -top-2 -right-2 bg-red-500 border-2 border-black rounded-full w-6 h-6 flex items-center justify-center">
                            <span className="text-white text-[10px] font-bold">
                              {unreadCounts[user.username] > 9 ? '9+' : unreadCounts[user.username]}
                            </span>
                          </div>
                        )}
                        <div className="flex items-center gap-2">
                          <div className="text-2xl">{user.flag || '👤'}</div>
                          <div className="flex-1 text-left">
                            <div className="text-[10px] pixel-font text-black break-all">{user.username}</div>
                            <div className="flex items-center gap-1 mt-1">
                              <div className="w-2 h-2 border border-black bg-[#4ade80] rounded-full"></div>
                              <span className="text-[8px] text-black">ONLINE</span>
                            </div>
                          </div>
                        </div>
                      </button>
                    ))
                  )}
                </div>

                <div className="p-3 border-t-4 border-black bg-[#ff6b9d]">
                  <div className="pixel-font text-[8px] text-white text-center">
                    {onlineUsers.length} USER{onlineUsers.length !== 1 ? 'S' : ''} ONLINE
                  </div>
                </div>
                </div>
              </div>
              
              {/* Toggle Button - Always visible, higher z-index than sidebar */}
              <button
                onClick={() => setShowSidebar(!showSidebar)}
                className={`
                  lg:hidden fixed top-1/2 -translate-y-1/2 z-50 
                  w-5 h-10 bg-[#ffe066] border-2 border-black 
                  hover:bg-[#ffd633] pixel-button flex items-center justify-center rounded-r text-xs
                  transition-all duration-300 ease-in-out
                  shadow-[4px_4px_0_rgba(0,0,0,0.3)]
                  ${showSidebar ? 'left-64' : 'left-0'}
                `}
                style={{ borderLeftWidth: '0' }}
              >
                {showSidebar ? <ChevronLeft size={12} /> : <ChevronRight size={12} />}
              </button>

              {/* Chat Area - Flex grow on desktop, full width on mobile */}
              <div className="flex-1 bg-gradient-to-b from-[#ff6b9d] to-[#ff8fab] border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,0.3)] rounded-xl flex flex-col min-h-0 overflow-hidden lg:ml-4">
                {isGroupChat || activeChat || activeRoom ? (
                  <>
                    <div className="bg-[#ffa94d] p-4 border-b-4 border-black rounded-t-lg">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-[#ffe066] border-4 border-black rounded flex items-center justify-center text-xl">
                          {isGroupChat ? '🌐' : activeRoom ? '🏠' : '👤'}
                        </div>
                        <div>
                          <div className="pixel-font text-[10px] text-white">
                            {isGroupChat 
                              ? 'Main Chat' 
                              : activeRoom 
                                ? (customRooms.find(r => r.id === activeRoom)?.name || 'Room') 
                                : activeChat
                            }
                          </div>
                          <div className="text-[8px] text-white/70 mt-1">
                            {isGroupChat 
                              ? `${onlineUsers.length + 1} members` 
                              : activeRoom 
                                ? `${customRooms.find(r => r.id === activeRoom)?.memberCount || 0} members`
                                : '● ONLINE'
                            }
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-[#c084fc]/20 min-h-0">
                      {currentMessages.length === 0 ? (
                        <div className="text-center text-white text-sm p-8">
                          {isGroupChat ? 'Be the first to say hello! 👋' : `Start chatting with ${activeChat}!`}
                        </div>
                      ) : (
                        currentMessages.map((msg, idx) => (
                          <div key={idx} className={`flex ${msg.from === username ? 'justify-end' : 'justify-start'}`}>
                            <div
                              className={`max-w-[70%] p-3 border-4 border-black shadow-[4px_4px_0_rgba(0,0,0,0.3)] rounded-lg ${
                                msg.from === username ? 'bg-[#ffe066]' : 'bg-[#ffa94d]'
                              }`}
                            >
                              <div className="text-[10px] font-bold text-black mb-2 pixel-font flex items-center gap-2">
                                <span>{msg.from}</span>
                                <span className="text-black/50">•</span>
                                <span className="text-[8px] text-black/70">{msg.time}</span>
                              </div>
                              <div className="text-sm text-black break-words">{msg.text}</div>
                            </div>
                          </div>
                        ))
                      )}
                      <div ref={messagesEndRef} />
                    </div>

                    <div className="p-4 bg-[#ff6b9d] border-t-4 border-black rounded-b-lg relative">
                      {/* Emoji Picker Popup */}
                      {showEmojiPicker && (
                        <div className="absolute bottom-full left-0 mb-2 w-80 h-64 bg-[#ffe066] border-4 border-black rounded-lg shadow-[8px_8px_0_rgba(0,0,0,0.3)] overflow-hidden z-50">
                          <div className="flex justify-between items-center p-2 border-b-2 border-black bg-[#ff6b9d]">
                            <div className="pixel-font text-[10px] text-black font-bold">SELECT EMOJI:</div>
                            <button
                              onClick={() => setShowEmojiPicker(false)}
                              className="text-black hover:text-white"
                            >
                              <X size={16} />
                            </button>
                          </div>
                          <div className="grid grid-cols-8 gap-1 p-2 h-[calc(100%-2.5rem)] overflow-y-auto">
                            {emojis.map((emoji, i) => (
                              <button
                                key={i}
                                onClick={() => insertEmoji(emoji)}
                                className="text-2xl p-2 hover:scale-110 transition-transform"
                              >
                                {emoji}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                      
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setShowEmojiPicker(!showEmojiPicker)}
                          className="p-2 bg-[#ffe066] border-2 border-black hover:bg-[#ffd633] pixel-button rounded"
                        >
                          <Smile size={20} />
                        </button>
                        <input
                          type="text"
                          value={message}
                          onChange={(e) => setMessage(e.target.value)}
                          onKeyPress={handleKeyPress}
                          placeholder="TYPE MESSAGE..."
                          className="flex-1 px-4 py-2 bg-[#ffe066] border-4 border-black text-black placeholder-black/50 focus:outline-none focus:border-[#ffa94d] rounded"
                        />
                        <button
                          onClick={sendMessage}
                          className="px-6 py-2 bg-[#ffa94d] border-4 border-black hover:bg-[#ffbe7a] pixel-button font-bold rounded-lg"
                        >
                          <Send />
                        </button>
                      </div>
                    </div>
                  </>
                ) : (
                  <div className="flex-1 flex items-center justify-center">
                    <div className="text-center text-white p-8">
                      <div className="text-6xl mb-4">💬</div>
                      <div className="pixel-font text-sm mb-2">SELECT A CHAT</div>
                      <div className="text-xs">to start messaging</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
            
            {/* Create Room Modal */}
            {showCreateRoom && (
              <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div className="bg-gradient-to-b from-[#ff6b9d] to-[#ff8fab] border-4 border-black rounded-xl shadow-[8px_8px_0_rgba(0,0,0,0.3)] max-w-md w-full p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="pixel-font text-lg text-black font-bold">CREATE ROOM</h2>
                    <button
                      onClick={() => {
                        setShowCreateRoom(false);
                        setNewRoomName('');
                      }}
                      className="text-black hover:text-red-500"
                    >
                      <X size={24} />
                    </button>
                  </div>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="pixel-font text-[10px] text-black mb-2 block font-bold">ROOM NAME:</label>
                      <input
                        type="text"
                        value={newRoomName}
                        onChange={(e) => setNewRoomName(e.target.value)}
                        onKeyPress={(e) => {
                          if (e.key === 'Enter' && newRoomName.trim()) {
                            createRoom();
                          }
                        }}
                        placeholder="Enter room name..."
                        className="w-full px-4 py-2 bg-[#ffe066] border-4 border-black text-black placeholder-black/50 pixel-font text-xs focus:outline-none focus:border-[#ff6b9d] rounded"
                        maxLength={30}
                        autoFocus
                      />
                      <div className="text-[8px] text-black/70 mt-2 pixel-font">
                        Room will be created with you as the first member.
                      </div>
                    </div>
                    
                    <div className="flex gap-2">
                      <button
                        onClick={() => {
                          setShowCreateRoom(false);
                          setNewRoomName('');
                        }}
                        className="flex-1 px-4 py-2 bg-white border-4 border-black hover:bg-red-500 hover:text-white pixel-button rounded-lg pixel-font text-xs"
                      >
                        CANCEL
                      </button>
                      <button
                        onClick={createRoom}
                        disabled={!newRoomName.trim()}
                        className="flex-1 px-4 py-2 bg-[#ffe066] border-4 border-black hover:bg-[#ffd633] pixel-button rounded-lg pixel-font text-xs disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        CREATE
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<PixelMessenger />, document.getElementById('root'));
  </script>
</body>
</html>
